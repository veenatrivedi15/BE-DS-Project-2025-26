<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Therapist Task Management</title>
  <script src="/_sdk/data_sdk.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
        body {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            height: 100%;
        }

        html {
            height: 100%;
        }

        .app-wrapper {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 25px;
        }

        .page-header {
            background: white;
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .page-header h1 {
            margin: 0 0 10px 0;
            font-size: 2.8em;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .page-header p {
            margin: 0;
            color: #64748b;
            font-size: 1.1em;
        }

        .content-card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.8em;
            color: #1e293b;
            margin: 0 0 25px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-selector {
            background: #f1f5f9;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .user-selector label {
            display: block;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .user-selector select {
            width: 100%;
            padding: 15px 20px;
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.05em;
            background: white;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .user-selector select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .add-task-section {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            padding: 30px;
            border-radius: 15px;
            border: 3px dashed #cbd5e1;
            margin-bottom: 35px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            background: white;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .audio-recorder {
            background: white;
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }

        .audio-recorder-title {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .record-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            font-size: 2.5em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
        }

        .record-button:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(239, 68, 68, 0.4);
        }

        .record-button.recording {
            background: linear-gradient(135deg, #10b981, #059669);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
            50% { box-shadow: 0 8px 40px rgba(16, 185, 129, 0.6); }
        }

        .record-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .recording-status {
            color: #64748b;
            font-weight: 600;
            margin-top: 10px;
            font-size: 0.95em;
        }

        .audio-playback {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 10px;
            display: none;
        }

        .audio-playback.show {
            display: block;
        }

        .audio-playback audio {
            width: 100%;
            margin-top: 10px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.05em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .task-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .task-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-color: #3b82f6;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .task-title {
            font-size: 1.4em;
            font-weight: 700;
            color: #1e293b;
            margin: 0;
        }

        .task-category {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.9em;
        }

        .category-exercise {
            background: #dbeafe;
            color: #1e40af;
        }

        .category-meal {
            background: #fef3c7;
            color: #92400e;
        }

        .category-therapy {
            background: #e0e7ff;
            color: #3730a3;
        }

        .category-hygiene {
            background: #ddd6fe;
            color: #5b21b6;
        }

        .category-learning {
            background: #d1fae5;
            color: #065f46;
        }

        .category-social {
            background: #fce7f3;
            color: #9f1239;
        }

        .task-body {
            margin-bottom: 15px;
        }

        .task-description {
            color: #475569;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .task-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.9em;
            color: #64748b;
            margin-bottom: 15px;
        }

        .task-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .audio-player-section {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .audio-player-section audio {
            width: 100%;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.9em;
            border-radius: 8px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .empty-state-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: #475569;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .toast {
            position: fixed;
            top: 25px;
            right: 25px;
            background: white;
            padding: 20px 28px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            border-left: 5px solid #10b981;
            font-weight: 600;
        }

        .toast.show {
            display: flex;
            animation: slideIn 0.4s ease;
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(450px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .app-wrapper {
                padding: 15px;
            }

            .page-header h1 {
                font-size: 2em;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .task-header {
                flex-direction: column;
            }

            .task-actions {
                justify-content: center;
            }
        }
    </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
 </head>
 <body>
  <div class="app-wrapper">
   <div class="page-header">
    <h1 id="pageTitle">📋 Task Management</h1>
    <button class="back-btn" onclick="history.back()">← Back to Dashboard</button>
    <p>Create and manage daily routine tasks for users with audio instructions</p>
   </div>
   <div class="content-card">
    <div class="add-task-section">
        <div class="section-title">
            ➕ <span id="addTaskButton">Assign New Routine Task</span>
        </div>
        <form id="taskForm" onsubmit="handleAddTask(event)">
    <div class="form-grid">
        <div class="form-group">
            <label for="userSelect">Assign To Patient *</label>
            <select id="userSelect" required>
                <option value="">-- Select a Patient --</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="taskTitle">Task Title *</label>
            <input type="text" id="taskTitle" required placeholder="e.g., Morning Exercise">
        </div>

        <div class="form-group">
            <label for="taskCategory">Category *</label>
            <select id="taskCategory" required>
                <option value="">Select Category</option>
                <option value="exercise">💪 Exercise</option>
                <option value="meal">🍽️ Meal</option>
                <option value="therapy">🧠 Therapy Activity</option>
                <option value="hygiene">🧼 Hygiene</option>
                <option value="learning">📚 Learning</option>
                <option value="social">👥 Social Activity</option>
            </select>
        </div>

        <div class="form-group">
            <label for="scheduledTime">Scheduled Time *</label>
            <input type="time" id="scheduledTime" required>
        </div>

        <div class="form-group">
            <label for="duration">Duration (minutes) *</label>
            <input type="number" id="duration" required min="5" max="300" placeholder="30">
        </div>
    </div>

    <div class="form-group" style="margin-bottom: 25px;">
        <label for="taskDescription">Task Description</label>
        <textarea id="taskDescription" placeholder="Describe the task details..."></textarea>
    </div>

    <div class="audio-recorder">
        <div class="audio-recorder-title">🎤 Audio Instructions</div>
        <p style="color: #64748b; margin-bottom: 20px;">Record voice instructions for the user</p>
        
        <button type="button" id="recordButton" class="record-button" onclick="toggleRecording()"> 🎤 </button>
        
        <div class="recording-status" id="recordingStatus">Click to start recording</div>
        
        <div class="audio-playback" id="audioPlayback">
            <div style="font-weight: 600; color: #1e293b; margin-bottom: 10px;">✅ Recording Complete</div>
            <audio id="audioPreview" controls></audio>
            <br>
            <button type="button" class="btn btn-primary btn-small" style="margin-top: 15px;" onclick="reRecord()"> 🔄 Re-record </button>
        </div>
    </div>

    <div class="button-group" style="margin-top: 25px;">
        <button type="submit" class="btn btn-success" id="saveTaskBtn"> 💾 Save & Assign Task </button>
    </div>
</form>

  <script>
        let allRecords = [];
        let mediaRecorder = null;
        let audioChunks = [];
        let recordedAudioBlob = null;
        let selectedUserId = '';

        const defaultConfig = {
            page_title: "📋 Task Management",
            add_task_button: "Add New Task"
        };

        const dataHandler = {
            onDataChanged(data) {
                allRecords = data;
                updateUI();
            }
        };

        const elementHandler = {
            defaultConfig: defaultConfig,
            async onConfigChange(config) {
                const pageTitle = document.getElementById('pageTitle');
                const addTaskButton = document.getElementById('addTaskButton');
                
                if (pageTitle) {
                    pageTitle.textContent = config.page_title || defaultConfig.page_title;
                }
                if (addTaskButton) {
                    addTaskButton.textContent = config.add_task_button || defaultConfig.add_task_button;
                }
            },
            mapToCapabilities: (config) => ({
                recolorables: [],
                borderables: [],
                fontEditable: undefined,
                fontSizeable: undefined
            }),
            mapToEditPanelValues: (config) => {
                return new Map([
                    ["page_title", config.page_title || defaultConfig.page_title],
                    ["add_task_button", config.add_task_button || defaultConfig.add_task_button]
                ]);
            }
        };

        async function initializeApp() {
            // 1. Fetch Users first to fill the dropdown
            await populateUserSelect();
            
            // 2. Fetch and render all tasks
            loadTasksList();
        }

        function updateUI() {
            populateUserSelect();
            renderTasksList();
        }

        async function populateUserSelect() {
            try {
                const response = await fetch('/api/get_users'); 
                const users = await response.json();
                const select = document.getElementById('userSelect');
                
                // Keep the default option
                select.innerHTML = '<option value="">-- Select a Patient --</option>';
                
                users.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.id;
                    option.textContent = user.full_name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error("Error loading users:", error);
            }
        }

        document.getElementById('userSelect').addEventListener('change', function(e) {
            selectedUserId = e.target.value;
            renderTasksList();
        });

        async function toggleRecording() {
            const recordButton = document.getElementById('recordButton');
            const recordingStatus = document.getElementById('recordingStatus');
            const audioPlayback = document.getElementById('audioPlayback');

            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        recordedAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const audioUrl = URL.createObjectURL(recordedAudioBlob);
                        const audioPreview = document.getElementById('audioPreview');
                        audioPreview.src = audioUrl;
                        audioPlayback.classList.add('show');
                        
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    recordButton.classList.add('recording');
                    recordButton.textContent = '⏹️';
                    recordingStatus.textContent = 'Recording... Click to stop';
                    audioPlayback.classList.remove('show');
                } catch (error) {
                    showToast('Please allow microphone access to record audio instructions', 'error');
                }
            } else {
                mediaRecorder.stop();
                recordButton.classList.remove('recording');
                recordButton.textContent = '🎤';
                recordingStatus.textContent = 'Click to start recording';
            }
        }

        function reRecord() {
            const audioPlayback = document.getElementById('audioPlayback');
            audioPlayback.classList.remove('show');
            recordedAudioBlob = null;
            document.getElementById('recordingStatus').textContent = 'Click to start recording';
        }

        // Replace your existing handleAddTask with this
        async function handleAddTask(e) {
            e.preventDefault();

            const userId = document.getElementById('userSelect').value;
            const title = document.getElementById('taskTitle').value;

            if (!userId) {
                showToast('Please select a user first', 'error');
                return;
            }

            if (!recordedAudioBlob) {
                showToast('Please record audio instructions before saving', 'error');
                return;
            }

            const saveBtn = document.getElementById('saveTaskBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'Processing...';

            // Convert Audio to Base64
            const reader = new FileReader();
            reader.readAsDataURL(recordedAudioBlob);
            reader.onloadend = async () => {
                const base64Audio = reader.result;

                const taskData = {
                    user_id: userId,
                    title: title,
                    category: document.getElementById('taskCategory').value,
                    scheduled_time: document.getElementById('scheduledTime').value,
                    duration: document.getElementById('duration').value,
                    description: document.getElementById('taskDescription').value,
                    audio_instructions: base64Audio
                };

                try {
                    const response = await fetch("/api/tasks/create", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(taskData)
                    });

                    const result = await response.json();
                    if (result.isOk) {
                        showToast('Task assigned successfully!', 'success');
                        document.getElementById('taskForm').reset();
                        reRecord(); // Reset audio UI
                        loadTasksList(); // Refresh list at the bottom
                    } else {
                        showToast('Error: ' + result.message, 'error');
                    }
                } catch (error) {
                    showToast('Connection to server failed', 'error');
                } finally {
                    saveBtn.disabled = false;
                    saveBtn.textContent = '💾 Save & Assign Task';
                }
            };
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');

            if (!toast || !toastMessage || !toastIcon) {
                console.warn("Toast HTML elements missing. Message:", message);
                alert(message); 
                return;
            }

            toastMessage.textContent = message;
            toastIcon.textContent = type === 'error' ? '❌' : '✅';
            
            if (type === 'error') toast.classList.add('error');
            else toast.classList.remove('error');

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function renderTasksList() {
            const tasks = allRecords.filter(r => r.type === 'task' && (!selectedUserId || r.user_id === selectedUserId));
            const container = document.getElementById('tasksList');

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <h3>No Tasks Yet</h3>
                        <p>${selectedUserId ? 'Create tasks for this user using the form above' : 'Select a user and create their first task'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="tasks-list">
                    ${tasks.map(task => {
                        const categoryIcons = {
                            exercise: '💪',
                            meal: '🍽️',
                            therapy: '🧠',
                            hygiene: '🧼',
                            learning: '📚',
                            social: '👥'
                        };

                        return `
                            <div class="task-card">
                                <div class="task-header">
                                    <h3 class="task-title">${task.task_title}</h3>
                                    <span class="task-category category-${task.task_category}">
                                        ${categoryIcons[task.task_category]} ${task.task_category.charAt(0).toUpperCase() + task.task_category.slice(1)}
                                    </span>
                                </div>
                                
                                <div class="task-body">
                                    <div class="task-meta">
                                        <div class="task-meta-item">
                                            <span>👤</span>
                                            <span>For: <strong>${task.user_name}</strong></span>
                                        </div>
                                        <div class="task-meta-item">
                                            <span>⏰</span>
                                            <span>${task.scheduled_time}</span>
                                        </div>
                                        <div class="task-meta-item">
                                            <span>⏱️</span>
                                            <span>${task.duration_minutes} minutes</span>
                                        </div>
                                        <div class="task-meta-item">
                                            <span>📅</span>
                                            <span>${task.created_date}</span>
                                        </div>
                                    </div>

                                    ${task.task_description ? `
                                        <div class="task-description">
                                            <strong>Description:</strong> ${task.task_description}
                                        </div>
                                    ` : ''}

                                    <div class="audio-player-section">
                                        <strong style="display: block; margin-bottom: 10px; color: #1e293b;">🎤 Audio Instructions:</strong>
                                        <audio controls src="${task.audio_instructions}"></audio>
                                    </div>
                                </div>

                                <div class="task-actions">
                                    <button class="btn btn-danger btn-small" onclick='deleteTask("${task.__backendId}")'>
                                        🗑️ Delete
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        async function loadTasksList() {
            const response = await fetch("/api/get_all_tasks");
            const tasks = await response.json();
            
            // Filter tasks if a user is selected in the dropdown
            const filteredTasks = selectedUserId 
                ? tasks.filter(t => t.user_id == selectedUserId) 
                : tasks;
                
            renderTasksHTML(filteredTasks);
        }

        async function deleteTask(taskId) {
            if (!confirm("Delete this task?")) return;
            
            const response = await fetch(`/api/tasks/delete/${taskId}`, { method: 'DELETE' });
            const result = await response.json();
            
            if (result.isOk) {
                showToast('Task removed', 'success');
                loadTasksList();
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
