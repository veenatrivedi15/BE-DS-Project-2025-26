<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Session - AutismCare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { background: white; min-height: 100vh; }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 1.8em; }
        .back-btn {
            background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: background 0.3s; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .main-content { padding: 40px; height: calc(100vh - 80px); display: flex; flex-direction: column; }
        .chat-container { display: flex; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; width: 100%; }
        .chat-header {
            background: #f8f9fa; padding: 20px; border-radius: 15px 15px 0 0; border: 2px solid #e1e5e9;
            border-bottom: 1px solid #e1e5e9; display: flex; justify-content: space-between; align-items: center;
        }
        .chat-info { display: flex; align-items: center; gap: 15px; }
        .admin-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;
        }
        .admin-status { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #28a745; }
        .status-dot.offline { background: #dc3545; }
        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto; background: white;
            border-left: 2px solid #e1e5e9; border-right: 2px solid #e1e5e9; min-height: 400px;
        }
        .message { margin-bottom: 20px; display: flex; align-items: flex-start; gap: 10px; }
        .message.user { justify-content: flex-end; }
        .message.user .message-content { order: -1; }
        .message-avatar {
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;
            font-size: 0.9em; flex-shrink: 0;
        }
        .message.admin .message-avatar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .message.user .message-avatar { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); }
        .message-content { max-width: 70%; }
        .message-bubble {
            padding: 12px 16px; border-radius: 18px; word-wrap: break-word; line-height: 1.4;
        }
        .message.admin .message-bubble { background: #f8f9fa; color: #333; border: 1px solid #e9ecef; }
        .message.user .message-bubble { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .message-time { font-size: 0.8em; color: #666; margin-top: 5px; text-align: right; }
        .message.admin .message-time { text-align: left; }
        .typing-indicator { display: none; padding: 15px 20px; color: #666; font-style: italic; }
        .typing-dots { display: inline-block; animation: typing 1.5s infinite; }
        @keyframes typing { 0%, 60%, 100% { opacity: 0; } 30% { opacity: 1; } }
        .chat-input {
            display: flex; padding: 20px; background: white; border: 2px solid #e1e5e9;
            border-radius: 0 0 15px 15px; border-top: 1px solid #e1e5e9; gap: 15px;
        }
        .input-container { flex: 1; position: relative; }
        .chat-input input {
            width: 100%; padding: 12px 20px; border: 2px solid #e1e5e9; border-radius: 25px; font-size: 16px;
            outline: none; transition: border-color 0.3s;
        }
        .chat-input input:focus { border-color: #667eea; }
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 12px 20px; border-radius: 25px;
            cursor: pointer; font-size: 16px; transition: transform 0.2s; min-width: 80px;
        }
        .send-btn:hover { transform: translateY(-1px); }
        .send-btn:disabled { background: #6c757d; cursor: not-allowed; transform: none; }
        .connection-status { padding: 10px 20px; text-align: center; font-size: 0.9em; border-radius: 10px; margin-bottom: 20px; }
        .connection-status.connected { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .connection-status.disconnected { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        @media (max-width: 768px) {
            .header { padding: 15px 20px; }
            .main-content { padding: 20px; }
            .message-content { max-width: 85%; }
            .chat-input { padding: 15px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>💬 Emotional Support Chatbot </h1>
        <a class="back-btn" href="{{ url_for('user_dashboard') }}">← Back to Dashboard</a>
    </div>

    <div class="main-content">
        <div class="chat-container">
            <div class="chat-header">
                <div class="chat-info">
                    <div class="admin-avatar">A</div>
                    <div>
                        <strong>Emotional Support</strong>
                        <div style="font-size: 0.9em; color: #666;">Direct communication channel</div>
                    </div>
                </div>
                <div class="admin-status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Online</span>
                </div>
            </div>

            <div class="connection-status connected" id="connectionStatus">
                ✅ Connected to support
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message admin">
                    <div class="message-avatar">A</div>
                    <div class="message-content">
                        <div class="message-bubble">
                            Hello! I'm here to help you with any questions or concerns you may have. How can I assist you today?
                        </div>
                        <div class="message-time">10:30 AM</div>
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                Support is typing<span class="typing-dots">...</span>
            </div>

            <div class="chat-input">
                <div class="input-container">
                    <input type="text" id="messageInput" placeholder="Type your message here..." onkeypress="handleEnter(event)">
                </div>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
let isConnected = true;

function showTypingIndicator() {
    document.getElementById('typingIndicator').style.display = 'block';
}

function hideTypingIndicator() {
    document.getElementById('typingIndicator').style.display = 'none';
}

// Send message function
async function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();

    if (message && isConnected) {
        addMessage(message, 'user');
        input.value = '';

        // Show typing indicator
        showTypingIndicator();

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });

            const data = await response.json();
            hideTypingIndicator();

            if (data.response) {
                addMessage(data.response, 'admin');
            } else {
                addMessage("⚠️ Error: No response from server.", 'admin');
            }
        } catch (err) {
            hideTypingIndicator();
            addMessage(`⚠️ Error: ${err}`, 'admin');
        }

    } else if (!isConnected) {
        alert('Cannot send message. Admin is currently offline.');
    }
}

// Add message to chat
function addMessage(text, sender) {
    const messagesContainer = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${sender}`;
    const currentTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    messageDiv.innerHTML = `
        <div class="message-avatar">${sender === 'admin' ? 'A' : 'U'}</div>
        <div class="message-content">
            <div class="message-bubble">${text}</div>
            <div class="message-time">${currentTime}</div>
        </div>
    `;
    messagesContainer.appendChild(messageDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// Handle Enter key to send
function handleEnter(event) {
    if (event.key === 'Enter') {
        sendMessage();
    }
}
</script>
</body>
</html>
