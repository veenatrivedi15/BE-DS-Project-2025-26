<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Skills Practice</title>

    <script src="{{ url_for('static', filename='js/data_sdk.js') }}"></script>
    <script src="{{ url_for('static', filename='js/element_sdk.js') }}"></script>

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            height: 100%;
        }
        html {
            height: 100%;
        }
        .app-wrapper {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 30px 25px;
        }
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 35px;
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.3);
            color: white;
        }
        .page-header h1 {
            margin: 0 0 12px 0;
            font-size: 2.8em;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .page-header p {
            margin: 0;
            font-size: 1.1em;
            opacity: 0.95;
        }
        .main-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
            margin-bottom: 30px;
        }
        .content-card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .feedback-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .feedback-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border-left: 5px solid #667eea;
        }
        .feedback-title {
            font-size: 1.1em;
            font-weight: 700;
            color: #1e293b;
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tone-card {
            border-left-color: #06b6d4;
        }
        .tone-card .feedback-title {

            color: #0891b2;

        }

        .clinical-card {

            border-left-color: #f59e0b;

        }

        .clinical-card .feedback-title {

            color: #d97706;

        }
        .next-steps-card {

            border-left-color: #10b981;

        }
        .next-steps-card .feedback-title {

            color: #059669;

        }
        .feedback-content {

            color: #475569;

            line-height: 1.8;

            font-size: 0.9em;

        }

        .tone-indicator {

            display: inline-flex;

            align-items: center;

            gap: 8px;

            padding: 8px 14px;

            border-radius: 20px;

            font-weight: 700;

            font-size: 0.85em;

            background: #d1fae5;

            color: #065f46;

            margin-bottom: 12px;

        }
        .tone-encouraging {

            background: #d1fae5;

            color: #065f46;

        }
        .tone-constructive {

            background: #fef3c7;

            color: #92400e;

        }
        .tone-challenging {

            background: #fecaca;

            color: #7f1d1d;

        }
        .feedback-list {

            list-style: none;

            padding: 0;

            margin: 0;

        }
        .feedback-list li {

            padding: 10px 0;

            padding-left: 25px;

            position: relative;

            color: #475569;

            font-size: 0.9em;

            line-height: 1.6;

        }
        .feedback-list li:before {

            content: '✓';

            position: absolute;

            left: 0;

            color: #10b981;

            font-weight: 700;

        }



        .next-steps-list {

            list-style: none;

            padding: 0;

            margin: 0;

        }
        .next-steps-list li {

            padding: 10px 0;

            padding-left: 25px;

            position: relative;

            color: #475569;

            font-size: 0.9em;

            line-height: 1.6;

        }
        .next-steps-list li:before {

            content: '→';

            position: absolute;

            left: 0;

            color: #10b981;

            font-weight: 700;

        }
        .assignments-list {

            display: grid;

            grid-template-columns: 1fr;

            gap: 20px;

        }
        .assignment-card {

            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);

            border-radius: 15px;

            border: 2px solid #e2e8f0;

            padding: 25px;

            cursor: pointer;

            transition: all 0.3s ease;

            position: relative;

            overflow: hidden;

        }



        .assignment-card::before {

            content: '';

            position: absolute;

            top: 0;

            left: 0;

            right: 0;

            height: 5px;

            background: linear-gradient(90deg, #667eea, #764ba2);

        }



        .assignment-card:hover {

            transform: translateX(-8px);

            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.15);

        }



        .skill-name {

            font-size: 1.5em;

            font-weight: 700;

            color: #1e293b;

            margin: 15px 0;

        }



        .difficulty-badge {

            display: inline-flex;

            align-items: center;

            gap: 6px;

            padding: 8px 14px;

            border-radius: 20px;

            font-weight: 700;

            font-size: 0.85em;

            margin-bottom: 15px;

        }



        .difficulty-beginner {

            background: #d1fae5;

            color: #065f46;

        }



        .difficulty-intermediate {

            background: #fef3c7;

            color: #92400e;

        }



        .difficulty-advanced {

            background: #fecaca;

            color: #7f1d1d;

        }



        .card-meta {

            display: flex;

            gap: 12px;

            flex-wrap: wrap;

            font-size: 0.9em;

            color: #64748b;

            margin-bottom: 15px;

        }



        .meta-item {

            display: flex;

            align-items: center;

            gap: 6px;

            font-weight: 600;

        }



        .description-text {

            color: #475569;

            line-height: 1.6;

            margin-bottom: 15px;

            font-size: 0.95em;

        }



        .progress-section {

            margin-top: 15px;

        }



        .progress-label {

            display: flex;

            justify-content: space-between;

            font-weight: 700;

            font-size: 0.9em;

            color: #1e293b;

            margin-bottom: 8px;

        }



        .progress-bar {

            width: 100%;

            height: 10px;

            background: #e2e8f0;

            border-radius: 10px;

            overflow: hidden;

        }



        .progress-fill {

            height: 100%;

            background: linear-gradient(90deg, #667eea, #764ba2);

            transition: width 0.3s ease;

        }



        .modal {

            display: none;

            position: fixed;

            top: 0;

            left: 0;

            right: 0;

            bottom: 0;

            background: rgba(0,0,0,0.7);

            z-index: 1000;

            align-items: center;

            justify-content: center;

            padding: 20px;

        }



        .modal.show {

            display: flex;

        }



        .modal-content {

            background: white;

            border-radius: 20px;

            padding: 40px;

            max-width: 900px;

            width: 100%;

            max-height: 90%;

            overflow-y: auto;

            box-shadow: 0 25px 60px rgba(0,0,0,0.3);

            display: grid;

            grid-template-columns: 1fr 300px;

            gap: 30px;

        }



        .modal-main {

            display: flex;

            flex-direction: column;

        }



        .modal-sidebar {

            display: flex;

            flex-direction: column;

            gap: 20px;

        }



        .modal-header {

            display: flex;

            justify-content: space-between;

            align-items: start;

            margin-bottom: 25px;

            flex-wrap: wrap;

            gap: 15px;

            grid-column: 1 / -1;

        }



        .modal-title {

            font-size: 2em;

            font-weight: 700;

            color: #1e293b;

            margin: 0;

        }



        .close-btn {

            background: #f1f5f9;

            border: none;

            border-radius: 50%;

            width: 40px;

            height: 40px;

            font-size: 1.5em;

            cursor: pointer;

            display: flex;

            align-items: center;

            justify-content: center;

            transition: all 0.3s ease;

        }



        .close-btn:hover {

            background: #e2e8f0;

        }



        .modal-section {

            margin-bottom: 25px;

        }



        .modal-section-title {

            font-size: 1.2em;

            font-weight: 700;

            color: #1e293b;

            margin: 0 0 12px 0;

            padding-bottom: 8px;

            border-bottom: 3px solid #667eea;

            display: inline-block;

        }



        .section-content {

            color: #475569;

            line-height: 1.8;

            font-size: 0.95em;

            margin-top: 10px;

        }



        .scenario-box {

            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);

            border-left: 5px solid #0284c7;

            padding: 20px;

            border-radius: 10px;

            margin: 15px 0;

        }



        .scenario-number {

            font-weight: 700;

            color: #0284c7;

            margin-bottom: 8px;

        }



        .scenario-text {

            color: #334155;

            line-height: 1.7;

        }



        .objectives-list {

            list-style: none;

            padding: 0;

            margin: 15px 0;

        }



        .objectives-list li {

            padding: 12px 0;

            padding-left: 30px;

            position: relative;

            color: #475569;

            line-height: 1.6;

        }



        .objectives-list li:before {

            content: '✓';

            position: absolute;

            left: 0;

            color: #10b981;

            font-weight: 700;

            font-size: 1.2em;

        }



        .practice-session {

            background: linear-gradient(135deg, #fef3c7 0%, #fcd34d 100%);

            border-radius: 15px;

            padding: 25px;

            margin: 20px 0;

            border: 2px solid #f59e0b;

        }



        .practice-controls {

            display: flex;

            gap: 15px;

            flex-wrap: wrap;

            margin-top: 25px;

            justify-content: flex-start;

            grid-column: 1 / -1;

        }



        .btn {

            padding: 14px 28px;

            border: none;

            border-radius: 12px;

            font-weight: 700;

            font-size: 1.05em;

            cursor: pointer;

            transition: all 0.3s ease;

            display: inline-flex;

            align-items: center;

            gap: 10px;

        }



        .btn-primary {

            background: linear-gradient(135deg, #667eea, #764ba2);

            color: white;

            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);

        }



        .btn-primary:hover {

            transform: translateY(-3px);

            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);

        }



        .btn-secondary {

            background: #06b6d4;

            color: white;

            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.3);

        }



        .btn-secondary:hover {

            transform: translateY(-3px);

            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.4);

        }



        .btn-small {

            padding: 10px 16px;

            font-size: 0.9em;

        }



        .form-group {

            margin-bottom: 20px;

        }



        .form-group label {

            display: block;

            font-weight: 700;

            color: #1e293b;

            margin-bottom: 10px;

            font-size: 0.95em;

        }



        .form-group textarea {

            width: 100%;

            padding: 14px 16px;

            border: 2px solid #e2e8f0;

            border-radius: 10px;

            font-size: 0.95em;

            font-family: inherit;

            min-height: 100px;

            resize: vertical;

            box-sizing: border-box;

        }



        .form-group textarea:focus {

            outline: none;

            border-color: #667eea;

            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);

        }



        .timer {

            background: white;

            border: 3px solid #667eea;

            border-radius: 15px;

            padding: 20px;

            text-align: center;

        }



        .timer-display {

            font-size: 2.5em;

            font-weight: 700;

            color: #667eea;

            font-family: 'Courier New', monospace;

        }



        .timer-label {

            color: #64748b;

            font-weight: 600;

            margin-top: 10px;

            font-size: 0.9em;

        }



        .empty-state {

            text-align: center;

            padding: 60px 20px;

            color: #94a3b8;

        }



        .empty-state-icon {

            font-size: 5em;

            margin-bottom: 20px;

        }



        .empty-state h3 {

            color: #475569;

            margin-bottom: 10px;

            font-size: 1.5em;

        }



        .toast {

            position: fixed;

            top: 25px;

            right: 25px;

            background: white;

            padding: 20px 28px;

            border-radius: 12px;

            box-shadow: 0 15px 40px rgba(0,0,0,0.2);

            display: none;

            align-items: center;

            gap: 15px;

            z-index: 1000;

            border-left: 5px solid #10b981;

            font-weight: 600;

        }



        .toast.show {

            display: flex;

            animation: slideIn 0.4s ease;

        }



        .toast.error {

            border-left-color: #ef4444;

        }



        @keyframes slideIn {

            from {

                transform: translateX(450px);

                opacity: 0;

            }

            to {

                transform: translateX(0);

                opacity: 1;

            }

        }



        .resource-link {

            display: inline-flex;

            align-items: center;

            gap: 8px;

            padding: 12px 20px;

            background: linear-gradient(135deg, #667eea, #764ba2);

            color: white;

            text-decoration: none;

            border-radius: 10px;

            font-weight: 600;

            transition: all 0.3s ease;

        }



        .resource-link:hover {

            transform: translateY(-3px);

            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);

        }



        .modal-feedback-card {

            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);

            border-radius: 12px;

            padding: 18px;

            border-left: 4px solid #06b6d4;

        }



        .modal-feedback-title {

            font-weight: 700;

            color: #0891b2;

            margin: 0 0 12px 0;

            display: flex;

            align-items: center;

            gap: 8px;

            font-size: 0.95em;

        }



        .modal-feedback-content {

            color: #334155;

            font-size: 0.85em;

            line-height: 1.6;

        }



        @media (max-width: 1200px) {

            .main-container {

                grid-template-columns: 1fr;

            }



            .feedback-sidebar {

                flex-direction: row;

                flex-wrap: wrap;

            }



            .feedback-card {

                flex: 1;

                min-width: 280px;

            }

        }



        @media (max-width: 768px) {

            .app-wrapper {

                padding: 15px;

            }



            .page-header {

                padding: 25px;

                margin-bottom: 25px;

            }



            .page-header h1 {

                font-size: 2em;

            }



            .modal-content {

                grid-template-columns: 1fr;

                gap: 20px;

                padding: 25px;

            }



            .modal-header {

                grid-column: 1;

            }



            .practice-controls {

                grid-column: 1;

            }



            .feedback-sidebar {

                flex-direction: column;

            }



            .feedback-card {

                min-width: auto;

            }

        }



        #chatWindow {

            display: flex;

            flex-direction: column; /* This is the key! */

            gap: 10px;

            height: 400px; /* Or whatever height you have */

            overflow-y: auto;

            padding: 10px;

        }



        #chatWindow > div {

            word-wrap: break-word;

            margin-bottom: 5px;

        }

        /* New Real-time Feedback Styles */
        .live-feedback-container {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }


        .tone-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .tone-neutral { background: #e2e8f0; color: #475569; }
        .tone-positive { background: #d1fae5; color: #065f46; }
        .tone-anxious { background: #ffedd5; color: #9a3412; }

        .feedback-text {
            font-size: 0.9em;
            color: #334155;
            line-height: 1.5;
            border-left: 3px solid #667eea;
            padding-left: 10px;
        }

        .tone-positive {
            background-color: #dcfce7;
            color: #166534;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <div class="app-wrapper">

        <div class="page-header">

            <h1 id="pageTitle">🎓 Social Skills Practice</h1>

            <button class="back-btn" onclick="history.back()">← Back to Dashboard</button>

            <p id="headerSubtitle">Your personalized social skills training</p>

        </div>



        <div class="main-container">

            <div class="content-card">

                <div class="assignments-list" id="assignmentsList"></div>

            </div>



            <div class="feedback-sidebar" id="feedbackSidebar"></div>

        </div>

    </div>



    <!-- Practice Modal -->

    <div class="modal" id="practiceModal">

        <div class="modal-content">

            <div class="modal-main">

                <div class="modal-header">

                    <h2 class="modal-title" id="modalTitle">Social Skill Practice</h2>

                    <button class="close-btn" onclick="closePracticeModal()">✕</button>

                </div>



                <div id="modalBody"></div>

            </div>



            <div class="modal-sidebar" id="modalSidebar"></div>



            <div class="practice-controls">

                <button class="btn btn-secondary btn-small" onclick="closePracticeModal()">← Back</button>

                <button class="btn btn-primary btn-small" onclick="completeSession()">✅ Complete Practice</button>

            </div>

        </div>

    </div>



    <div class="toast" id="toast">

        <span id="toastIcon">✅</span>

        <span id="toastMessage">Success!</span>

    </div>

    <script>

        let allAssignments = [];

        let timerInterval = null;

        let allRecords = [];



        const defaultConfig = {

            page_title: "🎓 Social Skills Practice",

            header_subtitle: "Your personalized social skills training",

            start_practicing_button: "Start Practicing"

        };



        const dataHandler = {

                onDataChanged: (data) => {

                    console.log("Data received:", data);

                    // Save the data into our variable

                    allRecords = Array.isArray(data) ? data : [];

                   

                    // Now call your render function

                    renderAssignmentsList();

                }

            };

               

                // ADD THIS BLOCK: If no data exists, add a placeholder

                //if (allAssignments.length === 0) {

                //    allAssignments.push({

                //        __backendId: "demo_1",

                //        skill_name: "Initial Greeting",

                //        practice_scenarios: "You are meeting a new coworker. Practice a friendly greeting.",

                //        status: "Active",

                //        progress: 0

                //    });

                //}

               



        const elementHandler = {

            defaultConfig: defaultConfig,

            async onConfigChange(config) {

                const pageTitle = document.getElementById('pageTitle');

                const headerSubtitle = document.getElementById('headerSubtitle');



                if (pageTitle) {

                    pageTitle.textContent = config.page_title || defaultConfig.page_title;

                }

                if (headerSubtitle) {

                    headerSubtitle.textContent = config.header_subtitle || defaultConfig.header_subtitle;

                }

            },

            mapToCapabilities: (config) => ({

                recolorables: [],

                borderables: [],

                fontEditable: undefined,

                fontSizeable: undefined

            }),

            mapToEditPanelValues: (config) => {

                return new Map([

                    ["page_title", config.page_title || defaultConfig.page_title],

                    ["header_subtitle", config.header_subtitle || defaultConfig.header_subtitle],

                    ["start_practicing_button", config.start_practicing_button || defaultConfig.start_practicing_button]

                ]);

            }

        };





        async function initializeApp() {

            // Check if the SDK loaded before trying to use it

            if (!window.dataSdk) {

                console.error('CRITICAL: data_sdk.js failed to load. Check your file paths!');

                alert("System Error: Data SDK not found. Please refresh the page.");

                return;

            }



            const dataResult = await window.dataSdk.init(dataHandler);

           

            if (!dataResult.isOk) {

                console.error('Failed to initialize data SDK:', dataResult.message);

            }



            if (window.elementSdk) {

                window.elementSdk.init(elementHandler);

            }

        }



        function renderFeedbackSidebar() {

            const container = document.getElementById('feedbackSidebar');



            if (allAssignments.length === 0) {

                container.innerHTML = '';

                return;

            }



            const recentAssignments = allAssignments.slice(0, 3);



            container.innerHTML = recentAssignments.map(assignment => {

                let toneEmoji = '💬';

                let toneColor = 'tone-encouraging';



                if (assignment.tone_feedback) {

                    if (assignment.tone_feedback.toLowerCase().includes('excellent') || assignment.tone_feedback.toLowerCase().includes('great')) {

                        toneEmoji = '⭐';

                        toneColor = 'tone-encouraging';

                    } else if (assignment.tone_feedback.toLowerCase().includes('good') || assignment.tone_feedback.toLowerCase().includes('progress')) {

                        toneEmoji = '👍';

                        toneColor = 'tone-constructive';

                    } else {

                        toneEmoji = '💡';

                        toneColor = 'tone-challenging';

                    }

                }



                return `

                    <div class="feedback-card">

                        <div class="feedback-title">

                            <span>🎯</span>

                            <span>${assignment.skill_name}</span>

                        </div>



                        ${assignment.tone_feedback ? `

                            <div class="tone-indicator ${toneColor}">

                                ${toneEmoji} Therapist's Tone

                            </div>

                            <div class="feedback-content">

                                ${assignment.tone_feedback}

                            </div>

                        ` : `

                            <div class="feedback-content" style="color: #94a3b8; font-style: italic;">

                                💭 No feedback yet from your therapist

                            </div>

                        `}



                        ${assignment.clinical_feedback ? `

                            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #e0e7ff;">

                                <div class="feedback-title" style="font-size: 1em; margin: 0 0 10px 0; border: none; padding: 0; color: #334155;">

                                    📊 Clinical Feedback

                                </div>

                                <div class="feedback-content" style="font-size: 0.85em;">

                                    ${assignment.clinical_feedback}

                                </div>

                            </div>

                        ` : ''}

                    </div>

                `;

            }).join('');

        }



        // Locate your renderAssignmentsList function and update the innerHTML part:

        function renderAssignmentsList() {
            const list = document.getElementById('assignmentsList');
            
            if (allRecords.length === 0) {
                list.innerHTML = '<div class="empty-state"><h3>No scenarios assigned.</h3></div>';
                return;
            }

            // Separate records into Active and Completed
            const activeTasks = allRecords.filter(r => r.practice_scenarios && r.progress < 100);
            const completedTasks = allRecords.filter(r => r.practice_scenarios && r.progress >= 100);

            let html = '';

            // Render Active Section
            if (activeTasks.length > 0) {
                html += '<h3 style="color: white; margin-bottom: 20px;">Current Practice</h3>';
                html += activeTasks.map(a => renderTaskCard(a, false)).join('');
            }

            // Render Completed Section
            if (completedTasks.length > 0) {
                html += '<h3 style="color: #94a3b8; margin-top: 40px; margin-bottom: 20px;">Completed Tasks</h3>';
                html += completedTasks.map(a => renderTaskCard(a, true)).join('');
            }

            list.innerHTML = html || '<div class="no-tasks">No scenarios found.</div>';
        }

        function renderTaskCard(a, isCompleted) {
            const targetId = a.__backendId || a.id;
            const opacity = isCompleted ? 'opacity: 0.7;' : '';
            const buttonLabel = isCompleted ? 'Review Practice' : 'Start Practice';
            
            return `
                <div class="assignment-card" style="${opacity} margin-bottom: 15px;">
                    <div class="card-header">🎬 Social Skill Practice ${isCompleted ? '✅' : ''}</div>
                    <div class="card-body">
                        <p style="${isCompleted ? 'text-decoration: none;' : ''}">${a.practice_scenarios}</p>
                        <div class="progress-section">
                            <div class="progress-label">
                                <span>Progress</span>
                                <span>${a.progress || 0}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${a.progress || 0}%"></div>
                            </div>
                        </div>
                        <div style="margin-top:15px; display: flex; justify-content: flex-end;">
                            <button class="btn ${isCompleted ? 'btn-secondary' : 'btn-primary'} btn-small"
                                    onclick="openPracticeModal('${targetId}')">
                                ${buttonLabel}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }



        function renderPatientTasks() {

            const list = document.getElementById('taskList'); // In patient view, it's often 'taskList'

           

            // The patient only sees tasks where practice_scenarios exists

            const myTasks = allRecords.filter(r => r.practice_scenarios && r.status !== 'completed');



            if (myTasks.length === 0) {

                list.innerHTML = "<p>No scenarios assigned yet!</p>";

                return;

            }



            list.innerHTML = myTasks.map(task => `

                <div class="scenario-card">

                    <h4>Practice This:</h4>

                    <p>${task.practice_scenarios}</p>

                </div>

            `).join('');

        }



        function openPracticeModal(backendId) {

            // 1. Log the search to your console so you can see what's happening

            console.log("Searching for ID:", backendId, "inside:", allRecords);



            // 2. Use loose equality (==) to ignore string vs number differences

            // 3. Check both .id and .__backendId

            currentAssignment = allRecords.find(a =>

                (a.id == backendId) || (a.__backendId == backendId)

            );



            if (!currentAssignment) {

                console.error("STILL NOT FOUND. Check if the IDs match in the console log above.");

                return;

            }



            // Reset Chat

            chatHistory = [];

            document.getElementById('modalTitle').textContent = currentAssignment.skill_name || "Social Skill Practice";



            // Set up the Modal Body

            let modalBodyHTML = `
                <div class="modal-section">
                    <h3 class="modal-section-title">📍 Your Scenario</h3>
                    <div style="background: #f8fafc; padding: 15px; border-radius: 10px; border-left: 4px solid #764ba2; margin-bottom: 20px; color: #475569; font-style: italic;">
                        ${currentAssignment.practice_scenarios || 'No scenario description provided.'}
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 250px; gap: 20px;">
                        <div>
                            <div id="chatWindow" style="height: 300px; overflow-y: auto; background: #ffffff; border: 2px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 15px;">
                                <div style="background: #f0f9ff; color: #0c4a6e; padding: 12px; border-radius: 12px; align-self: flex-start; max-width: 85%;">
                                    <strong>AI Guide:</strong> Hello! I'm ready to help you practice.
                                </div>
                            </div>

                            <div class="form-group" style="display: flex; gap: 12px;">
                                <input type="text" id="patientInput" placeholder="Type your response..." style="flex: 1; padding: 14px; border: 1px solid #cbd5e1; border-radius: 10px;">
                                <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">💬 Send</button>
                            </div>
                        </div>

                        <div class="live-feedback-container" id="liveAnalysisBox">
                            <h4 style="margin-top:0; font-size: 0.9em; color: #64748b;">LIVE ANALYSIS</h4>
                            <div id="toneDisplay"><span class="tone-badge">Waiting...</span></div>
                            <div id="feedbackDisplay" class="feedback-text">Start typing to see AI coaching feedback here.</div>
                        </div>
                    </div>

                    <div class="modal-section" style="margin-top:20px; border-top: 1px solid #eee; padding-top: 15px;">
                        <h3 class="modal-section-title">📝 Your Reflection</h3>
                        <textarea id="practiceReflection" placeholder="How did this feel?" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; min-height: 80px;"></textarea>
                    </div>
                </div>
            `;

            document.getElementById('modalBody').innerHTML = modalBodyHTML;
            document.getElementById('practiceModal').classList.add('show');

        }



        async function sendMessage() {

            const input = document.getElementById('patientInput');

            const chatWindow = document.getElementById('chatWindow');

            const sendBtn = document.getElementById('sendBtn');

            const message = input.value.trim();

           

            if (!message) return;



            // 1. Display Patient Message

            const userMsgDiv = document.createElement('div');

            userMsgDiv.style.cssText = "background: #764ba2; color: white; padding: 12px; border-radius: 12px; align-self: flex-end; max-width: 85%; box-shadow: 0 2px 5px rgba(0,0,0,0.1);";

            userMsgDiv.innerHTML = `<strong>You:</strong> `;

            userMsgDiv.appendChild(document.createTextNode(message));

            chatWindow.appendChild(userMsgDiv);

           
            input.value = '';

            chatWindow.scrollTop = chatWindow.scrollHeight;

            input.disabled = true;

            sendBtn.disabled = true;

            try {

                // Ensure this URL matches your Flask route exactly!

                const response = await fetch('/social_skills_api/chat_practice', {

                    method: 'POST',

                    headers: {'Content-Type': 'application/json'},

                    body: JSON.stringify({

                        message: message,

                        history: chatHistory,

                        context: currentAssignment.practice_scenarios

                    })

                });

                const data = await response.json();

                // Inside your sendMessage function, update the data.isOk block:
                 if (data.isOk) {
                chatHistory = data.history;

                // 1. Update the AI's response bubble
                const aiMsgDiv = document.createElement('div');
                aiMsgDiv.style.cssText = "background: #f0f9ff; color: #0c4a6e; padding: 12px; border-radius: 12px; align-self: flex-start; max-width: 85%; border: 1px solid #bae6fd;";
                aiMsgDiv.innerHTML = `<strong>AI:</strong> ${data.reply}`;
                chatWindow.appendChild(aiMsgDiv);

                // 2. FORCE UPDATE the Analysis Boxes (This makes it work for every message)
                const toneBox = document.getElementById('toneDisplay');
                const feedbackBox = document.getElementById('feedbackDisplay');

                if (toneBox) {
                    // Change the text and the color class for every message
                    toneBox.innerHTML = `<span class="tone-badge tone-positive">Tone: ${data.detected_tone}</span>`;
                }

                if (feedbackBox) {
                    // Overwrite the previous feedback tip
                    feedbackBox.innerText = data.coaching_feedback;
                }

                // Auto-scroll to the bottom
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
            } catch (e) {

                console.error("Chat Error:", e);
                showToast("Connection lost. check your Flask console.", "error");
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }
        function closePracticeModal() {

            document.getElementById('practiceModal').classList.remove('show');

            if (timerInterval) {

                clearInterval(timerInterval);

                timerInterval = null;

            }

            currentAssignment = null;

        }



        function toggleTimer() {

            if (timerInterval) {

                clearInterval(timerInterval);

                timerInterval = null;

                return;

            }



            const durationMinutes = currentAssignment.duration_minutes;

            let timeRemaining = durationMinutes * 60;



            const timerDisplay = document.getElementById('timerDisplay');

            const startBtn = event.target;



            startBtn.textContent = '⏸️ Stop Timer';



            timerInterval = setInterval(() => {

                timeRemaining--;



                const minutes = Math.floor(timeRemaining / 60);

                const seconds = timeRemaining % 60;

                timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;



                if (timeRemaining <= 0) {

                    clearInterval(timerInterval);

                    timerInterval = null;

                    showToast('Practice time complete! 🎉', 'success');

                    startBtn.textContent = '⏱️ Time\'s Up!';

                    startBtn.disabled = true;

                }

            }, 1000);

        }



        async function completeSession() {

            if (!currentAssignment) return;



            const reflection = document.getElementById('practiceReflection').value.trim();



            if (!reflection) {

                showToast('Please share your reflection before completing the session', 'error');

                return;

            }



            const updated = {

                ...currentAssignment,

                progress: Math.min(currentAssignment.progress + 25, 100),

                reflection: reflection,

                practice_log: (currentAssignment.practice_log || '') +

                    `\n[${new Date().toLocaleDateString()}] ${reflection}`

            };



            const result = await window.dataSdk.update(updated);



            if (result.isOk) {

                showToast('Practice session saved! Great job! 🎉', 'success');

                closePracticeModal();

                if (timerInterval) {

                    clearInterval(timerInterval);

                    timerInterval = null;

                }

            } else {

                showToast('Error saving your session. Please try again.', 'error');

            }

        }



        function showToast(message, type = 'success') {

            const toast = document.getElementById('toast');

            const toastMessage = document.getElementById('toastMessage');

            const toastIcon = document.getElementById('toastIcon');



            toastMessage.textContent = message;



            if (type === 'error') {

                toast.classList.add('error');

                toastIcon.textContent = '❌';

            } else {

                toast.classList.remove('error');

                toastIcon.textContent = '✅';

            }



            toast.classList.add('show');



            setTimeout(() => {

                toast.classList.remove('show');

            }, 3500);

        }



        initializeApp();

    </script>

</body>
