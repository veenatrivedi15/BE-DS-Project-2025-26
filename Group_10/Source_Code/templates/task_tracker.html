<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Tracker - AutismCare</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; }
    .container { background:white; min-height:100vh; }
    .header { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; padding:20px 40px; display:flex; justify-content:space-between; align-items:center; }
    .header h1 { font-size:1.8em; }
    .back-btn { background: rgba(255,255,255,0.2); color:white; border:1px solid rgba(255,255,255,0.3); padding:8px 16px; border-radius:6px; text-decoration:none; cursor:pointer; transition:0.3s; }
    .back-btn:hover { background: rgba(255,255,255,0.3); }
    .main-content { padding:40px; }
    .task-overview { display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:30px; }
    .overview-card { background:white; padding:20px; border-radius:15px; text-align:center; border:2px solid #e1e5e9; box-shadow:0 5px 15px rgba(0,0,0,0.08); }
    .overview-number { font-size:2.5em; font-weight:bold; margin-bottom:5px; }
    .overview-number.completed { color:#28a745; }
    .overview-number.pending { color:#ffc107; }
    .overview-number.overdue { color:#dc3545; }
    .overview-number.total { color:#667eea; }
    .overview-label { color:#666; font-size:0.9em; }
    .date-selector { background:white; padding:20px; border-radius:15px; margin-bottom:30px; border:2px solid #e1e5e9; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; }
    .date-nav { display:flex; align-items:center; gap:20px; }
    .date-btn { background:#f8f9fa; border:1px solid #e1e5e9; padding:8px 12px; border-radius:6px; cursor:pointer; transition:0.3s; }
    .date-btn:hover { background:#e9ecef; }
    .current-date { font-size:1.2em; font-weight:bold; color:#333; }
    .task-list { background:white; border-radius:15px; border:2px solid #e1e5e9; overflow:hidden; }
    .task-list-header { background:#f8f9fa; padding:20px; border-bottom:1px solid #e1e5e9; font-weight:bold; color:#333; }
    .task-item { padding:20px; border-bottom:1px solid #e1e5e9; display:flex; align-items:center; gap:15px; transition:0.3s; }
    .task-item:last-child { border-bottom:none; }
    .task-item.completed { background:#f8fff9; border-left:4px solid #28a745; }
    .task-item.overdue { background:#fff5f5; border-left:4px solid #dc3545; }
    .task-checkbox { width:20px; height:20px; cursor:pointer; transform:scale(1.2); }
    .task-content { flex:1; }
    .task-title { font-weight:bold; color:#333; margin-bottom:5px; font-size:1.1em; }
    .task-description { color:#666; font-size:0.9em; margin-bottom:8px; line-height:1.4; }
    .task-meta { display:flex; gap:20px; font-size:0.85em; flex-wrap:wrap; }
    .task-time { color:#667eea; font-weight:500; }
    .task-priority { padding:2px 8px; border-radius:12px; font-size:0.8em; font-weight:500; }
    .priority-high { background:#ffebee; color:#c62828; }
    .priority-medium { background:#fff3e0; color:#ef6c00; }
    .priority-low { background:#e8f5e8; color:#2e7d32; }
    .task-status { display:flex; align-items:center; gap:10px; min-width:120px; }
    .status-badge { padding:4px 12px; border-radius:15px; font-size:0.8em; font-weight:500; }
    .status-pending { background:#fff3cd; color:#856404; }
    .status-completed { background:#d4edda; color:#155724; }
    .status-overdue { background:#f8d7da; color:#721c24; }
    .progress-section { background:white; padding:25px; border-radius:15px; margin-top:30px; border:2px solid #e1e5e9; }
    .progress-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .progress-title { font-size:1.2em; font-weight:bold; color:#333; }
    .progress-percentage { font-size:1.5em; font-weight:bold; color:#667eea; }
    .progress-bar { background:#e9ecef; height:12px; border-radius:6px; overflow:hidden; margin-bottom:15px; }
    .progress-fill { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); height:100%; transition:width 0.5s ease; }
    .progress-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; margin-top:20px; }
    .stat-item { text-align:center; padding:15px; background:#f8f9fa; border-radius:10px; }
    .stat-number { font-size:1.5em; font-weight:bold; margin-bottom:5px; }
    .stat-label { color:#666; font-size:0.9em; }
    .timer-display { background:#fff3cd; border:1px solid #ffeaa7; border-radius:10px; padding:10px; margin-top:5px; text-align:center; }
    .timer-text { font-size:1.1em; color:#856404; font-weight:500; }
    .countdown-timer { font-size:1.2em; font-weight:bold; color:#d63384; }
    @media (max-width:768px){ .header { padding:15px 20px; } .main-content { padding:20px; } .task-overview { grid-template-columns:repeat(2,1fr); gap:15px; } .task-item { flex-direction:column; align-items:flex-start; gap:10px; } .task-meta { flex-direction:column; gap:5px; } .task-status { min-width:auto; align-self:flex-end; } }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📅 Daily Task Tracker</h1>
        <a class="back-btn" href="{{ url_for('user_dashboard') }}">← Back to Dashboard</a>
    </div>

    <div class="main-content">
        <!-- Task Overview -->
        <div class="task-overview">
            <div class="overview-card"><div class="overview-number total" id="totalTasks">0</div><div class="overview-label">Total Tasks</div></div>
            <div class="overview-card"><div class="overview-number completed" id="completedTasks">0</div><div class="overview-label">Completed</div></div>
            <div class="overview-card"><div class="overview-number pending" id="pendingTasks">0</div><div class="overview-label">Pending</div></div>
            <div class="overview-card"><div class="overview-number overdue" id="overdueTasks">0</div><div class="overview-label">Overdue</div></div>
        </div>

        <!-- Date Selector -->
        <div class="date-selector">
            <div class="date-nav">
                <button class="date-btn" onclick="changeDate(-1)">← Previous</button>
                <div class="current-date" id="currentDate"></div>
                <button class="date-btn" onclick="changeDate(1)">Next →</button>
            </div>
            <button class="date-btn" onclick="goToToday()">Today</button>
        </div>

        <!-- Task List -->
        <div class="task-list" id="taskList">
            <div class="task-list-header">📋 Tasks assigned by Admin</div>
            <!-- Tasks will be rendered here dynamically -->
        </div>

        <!-- Progress Section -->
        <div class="progress-section">
            <div class="progress-header">
                <div class="progress-title">Daily Progress</div>
                <div class="progress-percentage" id="progressPercentage">0%</div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            <div class="progress-stats">
                <div class="stat-item"><div class="stat-number" id="statCompleted" style="color:#28a745;">0</div><div class="stat-label">Tasks Completed</div></div>
                <div class="stat-item"><div class="stat-number" id="statTime" style="color:#667eea;">0h 0m</div><div class="stat-label">Time Spent</div></div>
                <div class="stat-item"><div class="stat-number" id="statPending" style="color:#ffc107;">0</div><div class="stat-label">Remaining Tasks</div></div>
                <div class="stat-item"><div class="stat-number" id="statOverdue" style="color:#dc3545;">0</div><div class="stat-label">Overdue Tasks</div></div>
            </div>
        </div>

        <div style="position: sticky; bottom: 30px; display: flex; justify-content: center; margin-top: 30px; z-index: 100;">
    <button class="btn" id="finalSaveBtn" onclick="saveAllProgress()" 
        style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%); 
               padding: 15px 40px; font-size: 1.2em; box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3); border: none; color: white; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s;">
        💾 Save & Update Progress Report
    </button>
</div>

    </div>
</div>

<script>
let tasks = []; // We start with an empty list

// 1. Fetch real tasks from the backend
async function loadTasks() {
    try {
        const response = await fetch('/api/tasks/my_tasks');
        
        // Check if the server actually returned a 200 OK
        if (!response.ok) {
            throw new Error(`Server responded with status ${response.status}`);
        }

        const data = await response.json();
        
        // Handle different possible JSON structures
        tasks = data.tasks ? data.tasks : data;
        
        console.log("Real tasks from DB:", tasks);
        renderTasks();
        updateProgress();
    } catch (error) {
        console.error("Failed to load tasks:", error);
        const list = document.getElementById('taskList');
        list.innerHTML = `<div class="empty-state"><h3>⚠️ Error connecting to server</h3><p>${error.message}</p></div>`;
    }
}

// 2. Render tasks with Audio support
function renderTasks() {
    const list = document.getElementById('taskList');
    // Clear existing tasks except the header
    const header = list.querySelector('.task-list-header');
    list.innerHTML = '';
    list.appendChild(header);

    tasks.forEach(task => {
        const div = document.createElement('div');
        div.className = 'task-item ' + (task.status === 'completed' ? 'completed' : '');
        div.innerHTML = `
            <input type="checkbox" class="task-checkbox" ${task.status === 'completed' ? 'checked' : ''} 
                onchange="toggleTask(this, ${task.id})">
            <div class="task-content">
                <div class="task-title">${task.title}</div>
                <div class="task-description">${task.description || ''}</div>
                <div class="task-meta">
                    <span class="task-time">⏰ ${task.time || 'Scheduled'}</span>
                    <span class="task-priority priority-medium">${task.category}</span>
                    
                    ${task.audio_instructions ? `
                        <button class="date-btn" onclick="playAudio('${task.audio_instructions}')" 
                                style="margin-left:15px; padding: 2px 10px; font-size: 0.8em;">
                            🔊 Listen to Instructions
                        </button>
                    ` : ''}
                </div>
            </div>
            <div class="task-status">
                <span class="status-badge ${task.status === 'completed' ? 'status-completed' : 'status-pending'}">
                    ${task.status === 'completed' ? '✅ Completed' : '⏳ Pending'}
                </span>
            </div>
        `;
        list.appendChild(div);
    });
}

// 3. Play the Base64 Audio recorded by the therapist
function playAudio(base64Data) {
    const audio = new Audio(base64Data);
    audio.play();
}

// 4. Update task status in the Database
async function toggleTask(checkbox, id) {
    const newStatus = checkbox.checked ? 'completed' : 'pending';
    try {
        await fetch(`/api/tasks/update/${id}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ status: newStatus })
        });
        
        // Update local data and UI
        const task = tasks.find(t => t.id === id);
        task.status = newStatus;
        renderTasks();
        updateProgress();
        
        if(checkbox.checked) showNotification(`Great job! Task completed.`);
    } catch (error) {
        alert("Could not sync task status.");
    }
}

// 5. Update Progress Numbers
function updateProgress(){
    const completed = tasks.filter(t => t.status === 'completed').length;
    const total = tasks.length;
    const perc = total > 0 ? Math.round((completed / total) * 100) : 0;
    
    document.getElementById('totalTasks').textContent = total;
    document.getElementById('completedTasks').textContent = completed;
    document.getElementById('pendingTasks').textContent = total - completed;
    document.getElementById('progressPercentage').textContent = perc + '%';
    document.getElementById('progressFill').style.width = perc + '%';
    document.getElementById('statCompleted').textContent = completed;
}

// Date handling
let currentDate = new Date();
function updateDateDisplay(){
    const options = {weekday:'long', year:'numeric', month:'long', day:'numeric'};
    document.getElementById('currentDate').textContent = currentDate.toLocaleDateString('en-US', options);
}

function changeDate(dir){ 
    currentDate.setDate(currentDate.getDate() + dir); 
    updateDateDisplay(); 
}

function goToToday(){ 
    currentDate = new Date(); 
    updateDateDisplay(); 
}

// Notification Helper
function showNotification(msg){
    const n = document.createElement('div');
    n.style.cssText = "position:fixed;top:20px;right:20px;background:#28a745;color:white;padding:15px 20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.2);z-index:1000;";
    n.textContent = msg;
    document.body.appendChild(n);
    setTimeout(()=>n.remove(), 3000);
}

// Initial Load
document.addEventListener('DOMContentLoaded', () => {
    loadTasks();
    updateDateDisplay();
});

// Function to save all progress and sync with the therapist's report
async function saveAllProgress() {
    const btn = document.getElementById('finalSaveBtn');
    const originalText = btn.innerHTML;
    
    // Visual feedback
    btn.disabled = true;
    btn.innerHTML = "⌛ Syncing with Report...";
    btn.style.opacity = "0.7";

    try {
        // We call the loadTasks again to ensure our local state matches the DB
        await loadTasks();
        
        // Optional: Call an explicit sync endpoint if you have one, 
        // but since toggleTask already saves to DB, we just confirm it here.
        
        setTimeout(() => {
            showNotification("✅ Progress Report Updated Successfully!");
            btn.disabled = false;
            btn.innerHTML = originalText;
            btn.style.opacity = "1";
            
            // Animation effect for the progress bar
            const fill = document.getElementById('progressFill');
            fill.style.filter = "brightness(1.5)";
            setTimeout(() => fill.style.filter = "none", 500);
        }, 800);

    } catch (error) {
        showNotification("❌ Sync failed. Please check connection.", "error");
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

</script>
</body>
</html>
