<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AISAFERIDE Mobile Sender</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      padding: 24px;
      background: #0f172a; /* slate-900 */
      color: #fff;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .pill {
      background: #1f2937; /* gray-800 */
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1;
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    button {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    #startBtn {
      background: #22c55e; /* green-500 */
      color: #000;
    }

    #stopBtn {
      background: #ef4444; /* red-500 */
      color: #fff;
    }

    button:disabled {
      background: #4b5563; /* gray-600 */
      color: #9ca3af;
      cursor: not-allowed;
    }

    video {
      width: 100%;
      border-radius: 14px;
      background: #000;
      max-height: 420px;
      object-fit: contain;
      margin-bottom: 16px;
    }

    #log {
      background: #1f2937;
      border-radius: 14px;
      padding: 12px;
      height: 240px;
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #cbd5e1;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="title">
      📷 <span>AISAFERIDE Mobile Sender</span>
    </div>

    <div class="pills">
      <div class="pill">Target WS: <b id="targetWs"></b></div>
      <div class="pill">FPS: <b id="fps">0</b></div>
      <div class="pill">Status: <b id="status">idle</b></div>
    </div>

    <div class="buttons">
      <button id="startBtn" onclick="start()">Start Camera</button>
      <button id="stopBtn" onclick="stopAll()" disabled>Stop</button>
    </div>

    <video id="preview" autoplay playsinline muted></video>

    <div id="log">Waiting for start...</div>

    <!-- <div class="hint">
      ✅ Tip: Open this page in Chrome on mobile, allow camera permission.  
      If WS doesn't connect, check laptop IP + port 9000 + same network.
    </div> -->

  </div>

  <script>
    // ✅ DYNAMICALLY SET WS URL
    const WS_URL = `ws://${window.location.hostname}:9000`;

    // UI Elements
    const targetWsEl = document.getElementById("targetWs");
    const statusEl = document.getElementById("status");
    const fpsEl = document.getElementById("fps");
    const logBox = document.getElementById("log");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const videoEl = document.getElementById("preview");

    targetWsEl.innerText = WS_URL;

    // State
    let ws = null;
    let stream = null;
    let canvas = null;

    let sendTimer = null;
    let fpsTimer = null;
    let reconnectTimer = null;

    let isRunning = false;
    let sentFrames = 0;

    function log(msg) {
      const line = `${new Date().toLocaleTimeString()} | ${msg}`;
      logBox.innerHTML += `<div>${line}</div>`;
      logBox.scrollTop = logBox.scrollHeight;
      console.log(line);
    }

    function setStatus(s) {
      statusEl.innerText = s;
    }

    function setButtons(running) {
      startBtn.disabled = running;
      stopBtn.disabled = !running;
    }

    async function startCamera() {
      if (stream) return;

      log("📷 Requesting camera...");
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment",
          width: { ideal: 640 },
          height: { ideal: 480 }
        },
        audio: false
      });

      videoEl.srcObject = stream;
      await videoEl.play();

      canvas = document.createElement("canvas");
      canvas.width = 640;
      canvas.height = 480;

      log("✅ Camera started");
    }

    function startSendingLoop() {
      if (sendTimer) return;

      // FPS counter
      fpsTimer = setInterval(() => {
        fpsEl.innerText = sentFrames;
        sentFrames = 0;
      }, 1000);

      // 10 FPS sender loop
      sendTimer = setInterval(() => {
        if (!isRunning) return;
        if (!ws || ws.readyState !== 1) return;
        if (!canvas || !videoEl) return;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(videoEl, 0, 0, 640, 480);

        const jpeg = canvas.toDataURL("image/jpeg", 0.7);
        ws.send(jpeg);

        sentFrames++;
      }, 100);

      log("🎥 Streaming loop started (10 FPS)");
    }

    function stopTimers() {
      if (sendTimer) clearInterval(sendTimer);
      sendTimer = null;

      if (fpsTimer) clearInterval(fpsTimer);
      fpsTimer = null;

      fpsEl.innerText = "0";
      sentFrames = 0;
    }

    function scheduleReconnect() {
      if (!isRunning) return;
      if (reconnectTimer) return;

      log("🔁 Reconnecting in 3 seconds...");
      setStatus("reconnecting");

      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        if (!isRunning) return;
        connectWs();
      }, 3000);
    }

    function connectWs() {
      if (!isRunning) return;

      log("DEBUG: connectWs() called");
      log(`🔌 Connecting WS -> ${WS_URL}`);
      setStatus("connecting");

      ws = new WebSocket(WS_URL);

      // timeout protection
      const timeout = setTimeout(() => {
        if (ws && ws.readyState !== 1) {
          log("⏳ WS connect timeout (3s) -> retrying...");
          setStatus("timeout");
          try { ws.close(); } catch (e) {}
        }
      }, 3000);

      ws.onopen = () => {
        clearTimeout(timeout);
        log("✅ WebSocket connected");
        setStatus("connected");
        startSendingLoop();
      };

      ws.onerror = () => {
        clearTimeout(timeout);
        log("❌ WebSocket error (server not reachable / blocked)");
        setStatus("ws error");
      };

      ws.onclose = () => {
        clearTimeout(timeout);
        log("⚠️ WebSocket closed");
        setStatus("disconnected");

        // only reconnect if still running
        if (isRunning) scheduleReconnect();
      };
    }

    async function start() {
      if (isRunning) return;

      log("DEBUG: Start pressed");
      log("DEBUG: hostname=" + window.location.hostname);
      log("DEBUG: wsUrl=" + WS_URL);

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        log("❌ getUserMedia not supported (Use Chrome, not in-app browser)");
        setStatus("failed");
        return;
      }

      isRunning = true;
      setButtons(true);
      setStatus("starting");
      log("✅ Start clicked");

      try {
        await startCamera();
        connectWs();
      } catch (err) {
        log("❌ ERROR: " + err.message);
        setStatus("failed");
        isRunning = false;
        setButtons(false);
      }
    }

    function stopAll() {
      log("🛑 Stop clicked");
      setStatus("stopping");
      isRunning = false;

      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }

      stopTimers();

      if (ws) {
        try { ws.close(); } catch (e) {}
        ws = null;
      }

      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
        stream = null;
      }

      canvas = null;

      setStatus("idle");
      setButtons(false);
      log("✅ Stopped");
    }
  </script>
</body>
</html>
