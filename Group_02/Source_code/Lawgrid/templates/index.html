<!DOCTYPE html>
<html>
<head>
    <title>LawGrid – Contract Risk Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="header">
    <h1>LawGrid – Contract Risk Analyzer</h1>
</div>

<div class="container">
    <div class="upload-card">
        <h2>Upload Contract</h2>
        <p>Upload a legal contract (PDF) to analyze risks and recommendations.</p>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="contract" accept=".pdf" required><br>
            <button type="submit">Analyze Contract</button>
        </form>
    </div>
</div>

<div class="footer">
    © 2026 LawGrid – Legal AI Risk Analysis System
</div>

</body>
</html>
