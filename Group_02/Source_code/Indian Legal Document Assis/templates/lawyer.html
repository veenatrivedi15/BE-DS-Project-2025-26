<!DOCTYPE html>
<html>
<head>
    <title>Lawyer Dashboard</title>

    <style>
        body {
            font-family: "Segoe UI";
            background: #f4f6f9;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px auto;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
        }

        button {
            margin-top: 10px;
            margin-right: 10px;
            padding: 8px 12px;
            border: none;
            background: #1e3a8a;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button.reject {
            background: #dc2626;
        }
    </style>
</head>

<body>

<h2>⚖️ Lawyer Dashboard</h2>

<div id="docs"></div>

<script>
async function loadDocs() {
    const res = await fetch("/lawyer/documents");
    const data = await res.json();

    let html = "";

    data.documents.forEach(doc => {
        html += `
        <div class="card">
            <p><b>Issue:</b> ${doc[1]}</p>

            <textarea rows="6">${doc[2]}</textarea>

            <textarea id="comment-${doc[0]}" placeholder="Reason / Comment"></textarea>

            <button onclick="verify(${doc[0]}, 'verified')">Verify ✅</button>
            <button class="reject" onclick="verify(${doc[0]}, 'rejected')">Reject ❌</button>
        </div>
        `;
    });

    document.getElementById("docs").innerHTML = html;
}

async function verify(id, status) {
    const comment = document.getElementById("comment-" + id).value;

    await fetch("/lawyer/verify", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            doc_id: id,
            status: status,
            comment: comment
        })
    });

    alert("Updated ✅");
    loadDocs();
}

loadDocs();
</script>

</body>
</html>
