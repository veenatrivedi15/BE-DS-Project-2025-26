<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #fff;
            padding: 35px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #1e3a8a;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #1e3a8a;
            outline: none;
            box-shadow: 0 0 5px rgba(30,58,138,0.3);
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #1e3a8a;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e40af;
        }

        .link {
            margin-top: 12px;
            font-size: 13px;
        }

        .link a {
            color: #1e3a8a;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="link">
        Don’t have an account? <a href="/register-page">Register</a>
    </div>
</div>

<script>
async function login() {
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if (res.ok) {
        window.location.href = data.redirect;
    } else {
        alert(data.message);
    }
}
</script>

</body>
</html>
