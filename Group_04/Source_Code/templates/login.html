{% extends "base.html" %}
{% block title %}Log In — I-Care{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex">
  <!-- Left — Decorative Panel -->
  <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden min-h-[calc(100vh-4rem)]">
    <img src="{{ url_for('static', filename='images/eye5.jpg') }}" alt="Eye care background" class="absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-br from-brand-700/90 to-violet-700/85"></div>
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PGNpcmNsZSBjeD0iMzAiIGN5PSIzMCIgcj0iMiIvPjwvZz48L2c+PC9zdmc+')] opacity-60"></div>
    <div class="absolute top-1/4 -left-20 w-72 h-72 bg-white/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-violet-400/10 rounded-full blur-3xl"></div>
    <div class="relative z-10 w-full h-full flex items-center justify-center px-12">
      <div class="text-center max-w-md">
      <div class="w-20 h-20 rounded-2xl bg-white/10 backdrop-blur-sm flex items-center justify-center mb-8 ring-1 ring-white/20">
        <svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
      </div>
      <h2 class="text-3xl font-bold text-white mb-4">Welcome back to I-Care</h2>
      <p class="text-brand-100 text-lg leading-relaxed max-w-sm">Your AI-powered eye health companion. Monitor, detect, and protect your vision.</p>
      </div>
    </div>
  </div>

  <!-- Right — Form -->
  <div class="flex-1 flex items-center justify-center px-4 sm:px-6 lg:px-8 bg-white">
    <div class="w-full max-w-md space-y-8">
      <!-- Mobile logo -->
      <div class="lg:hidden text-center">
        <div class="inline-flex items-center gap-2.5 mb-2">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-lg shadow-brand-500/25">
            <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </div>
          <span class="text-xl font-bold text-slate-900">I-Care</span>
        </div>
      </div>

      <div>
        <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 tracking-tight">Log in to your account</h1>
        <p class="mt-2 text-sm text-slate-500">Don't have an account? <a href="{{ url_for('signup') }}" class="font-semibold text-brand-600 hover:text-brand-700 transition-colors">Sign up for free</a></p>
      </div>

      <form method="POST" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
          <input type="email" name="email" id="email" required autocomplete="email"
                 class="w-full px-4 py-2.5 rounded-xl border border-slate-300 bg-white text-slate-900 text-sm placeholder-slate-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow"
                 placeholder="you@example.com">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input type="password" name="password" id="password" required autocomplete="current-password"
                 class="w-full px-4 py-2.5 rounded-xl border border-slate-300 bg-white text-slate-900 text-sm placeholder-slate-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow"
                 placeholder="Enter your password">
        </div>
        <button type="submit" class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-sm font-semibold text-white bg-brand-600 hover:bg-brand-700 shadow-lg shadow-brand-600/25 hover:shadow-brand-600/40 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-all">
          Log in
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
